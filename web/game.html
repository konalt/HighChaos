<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>%game%</title>
        <style>
            * {
                box-sizing: border-box;
            }

            body,
            html {
                background-color: black;
                margin: 0;
                width: 100%;
                height: 100%;
                padding: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                overscroll-behavior: contain;
            }

            canvas {
                display: block;
                image-rendering: pixelated;
            }
        </style>
        <script>
            window.hcGameID = "%game%";
        </script>
    </head>
    <body>
        <canvas id="canvas" data-real="yes"></canvas>
        <script type="module" src="/dist/%game%/index.js"></script>
    </body>
</html>
